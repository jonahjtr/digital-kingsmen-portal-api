# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect this repo
# Or fix existing service: add the env vars listed below manually.

databases:
  - name: dk-portal-db
    plan: free
    databaseName: digital_kingsmen_portal
    user: digital_kingsmen

services:
  - type: web
    name: digital-kingsmen-portal-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dk-portal-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://your-lovable-app.lovable.app
      - key: STORAGE_DRIVER
        value: local
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: NUDGE_COOLDOWN_MINUTES
        value: 240
