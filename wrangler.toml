name = "digital-kingsmen-portal-api"
account_id = "cca5a114f4b3baf1459a9b2697cad2e1"
main = "src/worker.ts"
workers_dev = true
compatibility_date = "2025-04-01"
compatibility_flags = [
  "nodejs_compat",
  "nodejs_compat_populate_process_env",
  "enable_nodejs_http_modules",
  "enable_nodejs_http_server_modules",
  # Prisma D1 DataLoader + Express on Workers: avoid cross-request promise cancellation
  "no_handle_cross_request_promise_resolution",
]

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "portal-db"
database_id = "1b418e58-1293-43b9-9706-27a023a6eeef"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "R2"
bucket_name = "portal-uploads"

# Logo resize/WebP via Cloudflare Images (Images Free: 5k transforms/month).
[images]
binding = "IMAGES"

[[durable_objects.bindings]]
name = "CONVERSATION_SERVER"
class_name = "ConversationPartyServer"

[[durable_objects.bindings]]
name = "USER_SERVER"
class_name = "UserPartyServer"

[[migrations]]
tag = "v1-partyserver"
new_sqlite_classes = ["ConversationPartyServer", "UserPartyServer"]

[vars]
JWT_EXPIRES_IN = "7d"
CORS_ORIGIN = "http://localhost:5173,http://localhost:8080,http://localhost:8081,http://localhost:8787,https://kingsmen-nexus.auto-cca.workers.dev"
APP_URL = "https://kingsmen-nexus.auto-cca.workers.dev"
NUDGE_COOLDOWN_MINUTES = "240"
STORAGE_DRIVER = "r2"

# Set secrets via: wrangler secret put JWT_SECRET

[dev]
port = 8787

[alias]
iconv-lite = "./src/shims/iconv-lite.ts"
